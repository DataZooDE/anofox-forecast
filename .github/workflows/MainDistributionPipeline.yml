#
# Main pipeline for building and distributing the anofox_forecast extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

# OIDC token needed for AWS credentials in the deploy job.
permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-lts-build:
    name: Build extension binaries (DuckDB LTS v1.4.5)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4-andium
    with:
      duckdb_version: v1.4.5
      ci_tools_version: v1.4-andium
      extension_name: anofox_forecast
      enable_rust: true
      # windows_amd64_rtools: only needed for R package builds
      # windows_amd64_mingw: rtools42 MinGW lacks libbcrypt.a needed by Rust getrandom 0.3+
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw'

  duckdb-lts-deploy:
    name: Deploy extension binaries (v1.4.5 LTS)
    needs: duckdb-lts-build
    # Run the deploy step even when a non-essential build matrix entry fails.
    # The deploy job itself fans out per arch and only pushes the artifacts
    # that actually exist.
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.4.5
      ci_tools_version: v1.4-andium
      extension_name: anofox_forecast
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw'
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  duckdb-latest-build:
    name: Build extension binaries (DuckDB latest v1.5.5)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.5
      ci_tools_version: v1.5-variegata
      extension_name: anofox_forecast
      enable_rust: true
      # windows_amd64_rtools: only needed for R package builds
      # windows_amd64_mingw: rtools42 MinGW lacks libbcrypt.a needed by Rust getrandom 0.3+
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw'

  duckdb-latest-deploy:
    name: Deploy extension binaries (v1.5.5)
    needs: duckdb-latest-build
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.5
      ci_tools_version: v1.5-variegata
      extension_name: anofox_forecast
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw'
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  build-and-test-rust:
    name: Rust Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust library
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test --all-features
